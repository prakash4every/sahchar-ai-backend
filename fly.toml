app = 'sahcharlive'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 10000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[processes]
  app = 'node server-live.js'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
